<div class="wrapper">
  <div class="card">

    <h2>Register</h2>

    <form (ngSubmit)="onRegister()">

      <input
        type="text"
        [(ngModel)]="username"
        name="username"
        placeholder="Username"
        required
      />

      <input
        type="password"
        [(ngModel)]="password"
        name="password"
        placeholder="Password"
        required
      />

      <input
        type="password"
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        placeholder="Confirm Password"
        required
      />

      <button type="submit">สมัครสมาชิก</button>
    </form>

    <p style="margin-top:10px;">มีบัญชีแล้ว?</p>

    <button (click)="goLogin()">กลับไป Login</button>

  </div>
</div>
